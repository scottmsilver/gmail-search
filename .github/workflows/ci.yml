name: CI
true:
  push:
    branches:
    - main
  pull_request: null
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - run: pip install "ruff>=0.5"
    - name: ruff check
      run: ruff check src/ tests/
  test:
    runs-on: ubuntu-latest
    services:
      paradedb:
        image: paradedb/paradedb:latest
        env:
          POSTGRES_USER: gmail_search
          POSTGRES_PASSWORD: gmail_search
          POSTGRES_DB: gmail_search
        ports:
        - 5544:5432
        options: --health-cmd "pg_isready -U gmail_search" --health-interval 5s --health-timeout 5s --health-retries 20
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install package + dev deps
      run: pip install -e ".[dev]"
    - name: "pytest (fast suite \u2014 integration/perf excluded via pyproject addopts)"
      run: python -m pytest -q
