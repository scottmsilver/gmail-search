# logrotate config for gmail-search on-disk logs (data/*.log).
#
# MUST use `copytruncate`. Both log writers keep a long-lived file descriptor
# that does NOT reopen on rename:
#   - systemd services with StandardOutput=append:.../data/mcp.log hold the FD
#     for the whole service lifetime;
#   - supervised daemons open(log_path, "a") once and hand that exact FD to the
#     child as stdout/stderr (src/gmail_search/store/jobs.py).
# A classic rename+create rotate would leave those writers appending to the
# stranded (renamed/unlinked) inode while the "new" file stays empty — silent
# log loss until the process restarts. `copytruncate` copies the contents to
# the rotated file then truncates the original in place, so the held FD keeps
# writing to the same inode. The tiny copy-race window is irrelevant at this
# single-host volume.
#
# Adjust the path below if your checkout is not at ~/development/gmail-search.

/home/ssilver/development/gmail-search/data/*.log {
    daily
    rotate 7
    size 50M
    compress
    delaycompress
    copytruncate
    missingok
    notifempty
}
